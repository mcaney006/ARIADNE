# Optional local backends for ARIADNE.
#
# The pure-Python core needs none of this — `ariadne replay` and the test suite
# run with zero infrastructure. These services exist for the high-volume and
# evidence-storage paths: ClickHouse for compiled detections over large event
# volumes, PostgreSQL for cases/identities/rule metadata, MinIO for immutable
# evidence objects, and the investigation console.
#
#   docker compose -f lab/docker/docker-compose.yml up
#
# Everything is local and disposable. No Kubernetes, no Kafka cluster.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports: ["8123:8123", "9000:9000"]
    environment:
      CLICKHOUSE_DB: ariadne
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ariadne
      POSTGRES_USER: ariadne
      POSTGRES_PASSWORD: ariadne
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ariadne
      MINIO_ROOT_PASSWORD: ariadne-evidence
    volumes:
      - minio-data:/data

  console:
    build:
      context: ../..
      dockerfile: lab/docker/Dockerfile
    command: ariadne console --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    working_dir: /app
    depends_on: [clickhouse, postgres, minio]

volumes:
  clickhouse-data:
  postgres-data:
  minio-data:
